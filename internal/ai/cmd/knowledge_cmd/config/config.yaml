# https://goframe.org/docs/web/server-config-file-template
server:
  address: ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# https://goframe.org/docs/core/glog-config
logger:
  level: "all"
  stdout: true

# Think 模型：用于复杂规划（plan_execute_replan），建议配 DeepSeek-R1
ds_think_chat_model:
  api_key: "${DS_THINK_API_KEY}"
  base_url: "${DS_THINK_BASE_URL}"
  model: "${DS_THINK_MODEL}"

# Quick 模型：用于普通对话和任务执行，建议配 DeepSeek-V3
ds_quick_chat_model:
  api_key: "${DS_QUICK_API_KEY}"
  base_url: "${DS_QUICK_BASE_URL}"
  model: "${DS_QUICK_MODEL}"

# 阿里云百炼 Embedding
doubao_embedding_model:
  api_key: "${DASHSCOPE_API_KEY}"
  base_url: "${DASHSCOPE_BASE_URL}"
  model: "${DASHSCOPE_EMBEDDING_MODEL}"

file_dir: "${FILE_DIR}"
